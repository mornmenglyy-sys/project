<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

        <style> body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #372d64, #928dab);
            color: #b91717;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }</style>
</head>

<body>


    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/templates/myshop.html">MyShop</a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="/templates/home.html">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/templates/products.html">Products</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href= "https://t.me/Moun_Sophanita">Contact</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <!-- Banner -->
     <button class="btn btn-info"> 
    <div class="container mt-4">
        <div class="p-5 bg-light text-center rounded">
            <h1>Welcome to My Shop</h1>
            <p>Best Products Online</p>
        </div>
    </div>
    </button>   
    <!-- Products -->
    <div class="container mt-5">
        <div class="row">

            <!-- Product 1 -->
               
            <div class="col-md-4 mt-5">
                <div class="card">
                    <img src="https://cdn.shopify.com/s/files/1/0875/8584/9683/files/apple-iphone-12-pro-max-grey_f3c2c4ed-82f6-426c-a348-c4ce86299f31.png?v=1720224426" 
                    class="card-img-top bg-primary-subtle">
                    <div class="card-body text-center">
                        <h5>iphone 15</h5>
                        <p>$500.00</p>
                        <button class="btn btn-primary">Buy</button>
                    </div>
                </div>
            </div>
            

            <!-- Product 2 -->
            <div class="col-md-4 mt-5">
                <div class="card">
                    <img src="https://scontent.fpnh2-1.fna.fbcdn.net/v/t39.30808-6/468961184_1118220070021613_2717671801817671828_n.jpg?_nc_cat=103&ccb=1-7&_nc_sid=7b2446&_nc_ohc=4zu_vyDXnLEQ7kNvwHfHTQf&_nc_oc=Adlx84kaz8eNgF8uq7wqh7FfTS4kybg7nKmgO8FcCoy4OsKMADoaO4nHKyAIyPhdj9A&_nc_zt=23&_nc_ht=scontent.fpnh2-1.fna&_nc_gid=ZQ3mzFKYGZpY_1LgDvSXhg&_nc_ss=8&oh=00_AfyG5QVpFiar2asWgngTiBUrW9W_CdlRlvA083eO60hzwA&oe=69B740E3" class="card-img-top">
                    <div class="card-body text-center">
                        <h5>iphone 13pro</h5>
                        <p>$350.00</p>
                        <button class="btn btn-primary">Buy</button>
                    </div>
                </div>
            </div>

            <!-- Product 3 -->
            <div class="col-md-4 mt-5">
                <div class="card">
                    <img src="https://scontent.fpnh2-3.fna.fbcdn.net/v/t39.30808-6/469010939_1118220043354949_7439783744212294925_n.jpg?_nc_cat=108&ccb=1-7&_nc_sid=7b2446&_nc_ohc=yTi7LGNx3DkQ7kNvwGgbjpb&_nc_oc=Admk265rGLQ7FGjsQx4Wlr5OjHi_rj9rH5yI1QKtonGbVNfvfZx0tYobxbFGeHYcaIk&_nc_zt=23&_nc_ht=scontent.fpnh2-3.fna&_nc_gid=0z03r0IpyIxCk-81Z51oVQ&_nc_ss=8&oh=00_AfyvFZdfrI4DJUqCYAfyiE4SAr4Rq-LgbfHekcGDX2IQ9A&oe=69B73E5E" class="card-img-top">
                    <div class="card-body text-center">
                        <h5>iphone 13Pro Max</h5>
                        <p>$400.00</p>
                        <button class="btn btn-primary">Buy</button>
                    </div>
                </div>
            </div>
             
            <div class="col-md-4 mt-5">
                <div class="card">
                    <img src="https://scontent.fpnh2-2.fna.fbcdn.net/v/t39.30808-6/468941848_1118219756688311_6223717476791048906_n.jpg?_nc_cat=107&ccb=1-7&_nc_sid=7b2446&_nc_ohc=OUmr2hOqjuYQ7kNvwH-Zd0N&_nc_oc=Adn9rzcRTVxDhLH06jS_V3oB29hJtltsBFztEtKsgI_ixFwgptCe7F879GVqHlRQf6g&_nc_zt=23&_nc_ht=scontent.fpnh2-2.fna&_nc_gid=boNjFFcIsVyy8UDIpJX8pw&_nc_ss=8&oh=00_AfxVcVrkKRm7LS7dOGFikRZGSQ8zJlooO-jbu-Pv2_HtMw&oe=69B74A80" alt="">
                <div class="card-body text-center">
                    <h6>iphone 13</h6>
                    <p>$300.00</p>
                    <button class="btn btn-primary">Buy</button>
                </div>
                </div>
            </div>

            <div class="col-md-4 mt-5">
                {%for data in products%}
                <div class="card">
                    <img src="{{url_for('static',filename="uploads/"+ data[4])}}" alt="">
                <div class="card-body text-center">
                    <h6>{{data[1]}}</h6>
                    <p>{{data[2]}}</p>
                    <button class="btn btn-primary">Buy</button>
                </div>
                </div>
                {%endfor%}
            </div>

        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center p-3 mt-5">
        <p>© 2026 My Website</p>
    </footer>

</body>

</html>
