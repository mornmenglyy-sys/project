<!DOCTYPE html>
<html>
<head>
    <title>{% if product %}Edit{% else %}Add{% endif %} Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1>{% if product %}Edit{% else %}Add{% endif %} Product</h1>

    <form method="POST" enctype="multipart/form-data">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" name="name" class="form-control" value="{{ product.name if product else '' }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Price</label>
            <input type="text" name="price" class="form-control" value="{{ product.price if product else '' }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Quantity</label>
            <input type="number" name="qty" class="form-control" value="{{ product.qty if product else '' }}" required>
        </div>

        {% if product and product.image %}
            <div class="mb-3">
                <label class="form-label">Current Image</label><br>
                <img src="{{ url_for('static', filename='uploads/' + product.image) }}" width="150">
            </div>
        {% endif %}

        <div class="mb-3">
            <label class="form-label">{% if product %}Change{% else %}Upload{% endif %} Image</label>
            <input type="file" name="image" class="form-control" accept="image/*">
        </div>

        <button type="submit" class="btn btn-primary">{% if product %}Update{% else %}Add{% endif %}</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Back</a>
    </form>
</div>
</body>
</html>
